<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0B0F19"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pulse wave lines -->
  <path d="M 60 256 L 120 256 L 140 200 L 160 312 L 180 256 L 220 256 L 240 180 L 260 332 L 280 256 L 320 256 L 340 160 L 360 352 L 380 256 L 420 256 L 440 200 L 452 256"
        stroke="url(#pulseGradient)"
        stroke-width="24"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Upward trend indicator (small arrow) -->
  <path d="M 440 280 L 460 260 L 470 270"
        stroke="#34d399"
        stroke-width="16"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
